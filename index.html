<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kudhail Family Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
/* ── Design System ── */
:root{
  --color-primary:#cc785c;--color-primary-active:#a9583e;
  --color-canvas:#faf9f5;--color-surface-soft:#f5f0e8;--color-surface-card:#efe9de;
  --color-surface-cream-strong:#e8e0d2;--color-surface-dark:#181715;
  --color-surface-dark-elevated:#252320;
  --color-hairline:#e6dfd8;--color-hairline-soft:#ebe6df;
  --color-ink:#141413;--color-body:#3d3d3a;--color-muted:#6c6a64;--color-muted-soft:#8e8b82;
  --color-on-primary:#fff;--color-on-dark:#faf9f5;--color-on-dark-soft:#a09d96;
  --color-success:#5db872;--color-warning:#d4a017;--color-error:#c64545;
  --font-serif:"Source Serif 4",Georgia,serif;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:"JetBrains Mono",monospace;
  --radius-sm:6px;--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-pill:9999px;
  --shadow-card:0 2px 12px rgba(20,20,19,0.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:var(--font-serif);font-weight:400}
h4,h5{font-family:var(--font-sans);font-weight:500;margin:0}
p{color:var(--color-body);margin:0}
a{color:var(--color-primary);text-decoration:none}
::selection{background:rgba(204,120,92,.22)}

/* ── Layout ── */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{background:var(--color-surface-soft);border-right:1px solid var(--color-hairline);padding:24px 16px;display:flex;flex-direction:column;gap:24px;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{padding:32px 48px 64px;max-width:1280px;width:100%}
.main.dense{padding:20px 32px 40px}

/* ── Brand ── */
.brand{display:flex;align-items:center;gap:10px;padding:0 8px}
.brand-mark{width:28px;height:28px;display:block}
.brand-name{font-family:var(--font-serif);font-size:18px;font-weight:400;letter-spacing:-.3px;color:var(--color-ink);line-height:1.15}
.brand-sub{font-family:var(--font-sans);font-size:11px;color:var(--color-muted);letter-spacing:.3px;text-transform:uppercase}

/* ── Nav ── */
.nav{display:flex;flex-direction:column;gap:2px}
.nav-section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.2px;color:var(--color-muted-soft);padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-md);font-size:14px;font-weight:500;color:var(--color-body);cursor:pointer;border:none;background:transparent;text-align:left;width:100%;font-family:var(--font-sans);transition:background 150ms}
.nav-item:hover{background:var(--color-surface-card)}
.nav-item.active{background:var(--color-surface-card);color:var(--color-ink)}
.nav-item-count{margin-left:auto;font-size:11px;color:var(--color-muted);font-weight:500}
.family-list{margin-top:auto;padding-top:16px;border-top:1px solid var(--color-hairline)}
.family-item{display:flex;align-items:center;gap:10px;padding:6px 8px;font-size:13px;color:var(--color-body)}
.family-avatar{width:24px;height:24px;border-radius:9999px;display:grid;place-items:center;font-size:11px;font-weight:600;color:#fff;font-family:var(--font-sans)}

/* ── Topbar ── */
.topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;gap:24px}
.topbar-greeting{font-family:var(--font-serif);font-size:32px;font-weight:400;letter-spacing:-.5px;color:var(--color-ink)}
.topbar-date{font-size:13px;color:var(--color-muted);margin-top:4px}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* ── Buttons ── */
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1;padding:10px 16px;border-radius:var(--radius-md);border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background 150ms;white-space:nowrap}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-active)}
.btn-secondary{background:var(--color-canvas);border-color:var(--color-hairline);color:var(--color-ink)}
.btn-secondary:hover{background:var(--color-surface-card)}
.btn-ghost{background:transparent;color:var(--color-body)}
.btn-ghost:hover{background:var(--color-surface-card)}
.btn-danger{background:transparent;color:var(--color-error);border-color:var(--color-hairline)}
.btn-icon{padding:8px;width:32px;height:32px;justify-content:center}

/* ── Cards ── */
.card{background:var(--color-surface-card);border-radius:var(--radius-lg);padding:24px}
.card.compact{padding:16px}
.card.dark{background:var(--color-surface-dark);color:var(--color-on-dark)}
.card-eyebrow{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.2px;color:var(--color-muted);margin-bottom:12px}
.card-title{font-family:var(--font-sans);font-size:14px;font-weight:600;color:var(--color-ink);margin:0}
.card-value{font-family:var(--font-serif);font-weight:400;font-size:36px;letter-spacing:-.5px;color:var(--color-ink);margin-top:8px;line-height:1.1}
.card.dark .card-value,.card.dark .card-title,.card.dark .card-eyebrow{color:var(--color-on-dark)}
.card.dark .muted{color:var(--color-on-dark-soft)}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-grid.three{grid-template-columns:repeat(3,1fr)}
.kpi-grid.two{grid-template-columns:repeat(2,1fr)}
.section-grid{display:grid;gap:16px}
.section-grid.two{grid-template-columns:1fr 1fr}
.section-grid.three{grid-template-columns:repeat(3,1fr)}
.section-grid.l-r{grid-template-columns:2fr 1fr}

/* ── Section header ── */
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin:32px 0 16px;gap:24px}
.section-header:first-child{margin-top:0}
.section-title{font-family:var(--font-serif);font-size:22px;font-weight:400;letter-spacing:-.3px;color:var(--color-ink)}
.section-subtitle{font-size:13px;color:var(--color-muted)}

/* ── Progress ── */
.progress{height:6px;background:var(--color-hairline);border-radius:var(--radius-pill);overflow:hidden}
.progress-fill{height:100%;background:var(--color-ink);border-radius:var(--radius-pill);transition:width 300ms}
.progress-fill.coral{background:var(--color-primary)}
.progress-fill.teal{background:#5db8a6}
.progress-fill.amber{background:#e8a55a}
.progress-fill.warn{background:var(--color-warning)}
.progress-fill.error{background:var(--color-error)}
.progress.thick{height:8px}

/* ── Credit card visual ── */
.cc{background:var(--color-surface-dark);color:var(--color-on-dark);border-radius:var(--radius-lg);padding:24px;aspect-ratio:1.586/1;max-width:360px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;font-family:var(--font-sans)}
.cc.coral{background:var(--color-primary)}
.cc.teal{background:#1f5e54}
.cc.amber{background:#8a5e2a}
.cc-network{font-family:var(--font-serif);font-size:20px;font-weight:400;letter-spacing:-.3px}
.cc-number{font-family:var(--font-mono);font-size:15px;letter-spacing:2px;margin-top:auto;color:rgba(255,255,255,.85)}
.cc-meta{display:flex;justify-content:space-between;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.55);margin-top:12px}
.cc-meta strong{display:block;font-size:13px;color:rgba(255,255,255,.95);font-weight:500;text-transform:none;letter-spacing:0;margin-top:2px}

/* ── Lists ── */
.list{display:flex;flex-direction:column}
.list-row{display:grid;align-items:center;padding:14px 0;border-bottom:1px solid var(--color-hairline-soft);font-size:14px;gap:16px}
.list-row:last-child{border-bottom:none}
.row-label{font-weight:500;color:var(--color-ink)}
.row-sub{font-size:12px;color:var(--color-muted);margin-top:2px}
.row-amount{font-family:var(--font-serif);font-size:18px;font-weight:400;color:var(--color-ink);text-align:right;letter-spacing:-.2px}
.row-actions{display:flex;gap:4px;opacity:0;transition:opacity 150ms}
.list-row:hover .row-actions{opacity:1}
.bill-row{grid-template-columns:1fr 90px 110px 72px}
.sub-row{grid-template-columns:36px 1fr 100px 72px}
.cc-list-row{grid-template-columns:1fr 1fr 130px 72px}
.invest-row{grid-template-columns:1fr 110px 110px 110px 72px}
.savings-row{grid-template-columns:1fr 90px 110px 110px 72px}
.loan-row{grid-template-columns:1fr 110px 110px 110px 72px}
.cat-header{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0 6px;border-bottom:1px solid var(--color-ink);margin-top:20px}
.cat-header:first-child{margin-top:0}
.cat-header h4{font-family:var(--font-sans);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--color-ink)}
.cat-header .cat-total{font-family:var(--font-serif);font-size:18px;color:var(--color-ink)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;background:var(--color-canvas);color:var(--color-muted);border:1px solid var(--color-hairline)}
.badge.coral{background:rgba(204,120,92,.12);color:var(--color-primary);border-color:rgba(204,120,92,.25)}
.badge.teal{background:rgba(93,184,166,.14);color:#2d8074;border-color:rgba(93,184,166,.3)}
.badge.amber{background:rgba(232,165,90,.14);color:#a06b21;border-color:rgba(232,165,90,.3)}
.badge.warn{background:rgba(212,160,23,.14);color:#8a6a0e;border-color:rgba(212,160,23,.3)}
.badge.error{background:rgba(198,69,69,.1);color:var(--color-error);border-color:rgba(198,69,69,.3)}
.badge.success{background:rgba(93,184,114,.12);color:#2f7d44;border-color:rgba(93,184,114,.3)}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(20,20,19,.4);display:grid;place-items:center;z-index:100;padding:32px}
.modal{background:var(--color-canvas);border-radius:var(--radius-lg);width:480px;max-width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal h3{font-family:var(--font-serif);font-size:24px;letter-spacing:-.3px;margin-bottom:4px}
.modal p{font-size:13px;color:var(--color-muted);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--color-body);margin-bottom:6px;letter-spacing:.2px}
.field input,.field select,.field textarea{width:100%;font-family:var(--font-sans);font-size:14px;padding:10px 12px;border:1px solid var(--color-hairline);border-radius:var(--radius-md);background:var(--color-canvas);color:var(--color-ink);transition:border-color 150ms,box-shadow 150ms}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(204,120,92,.15)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:24px}

/* ── Stacked bar ── */
.stack-bar{display:flex;height:10px;border-radius:var(--radius-pill);overflow:hidden;background:var(--color-hairline)}
.stack-bar>div{height:100%}
.stack-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12px}
.stack-legend-dot{width:8px;height:8px;border-radius:9999px;display:inline-block;margin-right:6px;vertical-align:middle}

/* ── Goal/trip ── */
.goal-progress-text{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px}
.goal-progress-text .pct{font-family:var(--font-serif);font-size:28px;letter-spacing:-.3px}

/* ── Helpers ── */
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.gap-xs{gap:4px}.gap-sm{gap:8px}.gap-md{gap:16px}.gap-lg{gap:24px}
.mt-xs{margin-top:4px}.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:24px}
.muted{color:var(--color-muted);font-size:13px}
.muted-sm{color:var(--color-muted);font-size:12px}
.tabular{font-variant-numeric:tabular-nums}
.serif{font-family:var(--font-serif);font-weight:400;letter-spacing:-.3px}
.amount-pos{color:var(--color-success)}.amount-neg{color:var(--color-error)}
.empty{padding:48px 24px;text-align:center;color:var(--color-muted)}
.empty h4{font-family:var(--font-serif);font-size:18px;color:var(--color-ink);margin-bottom:8px;font-weight:400}
.privacy-blur{filter:blur(8px);user-select:none;transition:filter 150ms}
.icon{display:inline-flex;vertical-align:middle}
.icon svg{display:block}

/* ── Tweaks panel ── */
.twk-panel{position:fixed;right:16px;bottom:16px;z-index:999;width:260px;background:rgba(250,249,247,.9);backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);font-family:var(--font-sans);font-size:12px;color:var(--color-ink)}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:default;border-bottom:1px solid var(--color-hairline)}
.twk-hd b{font-size:12px;font-weight:600}
.twk-x{appearance:none;border:0;background:transparent;color:var(--color-muted);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:14px;line-height:1;display:grid;place-items:center}
.twk-x:hover{background:rgba(0,0,0,.06);color:var(--color-ink)}
.twk-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px}
.twk-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.twk-lbl{font-weight:500;font-size:12px;color:var(--color-body)}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-muted);padding-top:6px}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0}
.twk-toggle[data-on="1"]{background:#34c759}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
.twk-toggle[data-on="1"] i{transform:translateX(14px)}
.twk-chips{display:flex;gap:5px;flex-wrap:wrap}
.twk-chip{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s}
.twk-chip:hover{transform:scale(1.15)}
.twk-chip.active{border-color:var(--color-ink)}
.twk-seg{display:flex;background:rgba(0,0,0,.07);border-radius:8px;padding:2px}
.twk-seg button{flex:1;border:0;background:transparent;font:inherit;font-size:11px;font-weight:500;padding:4px 6px;border-radius:6px;cursor:pointer;color:var(--color-body)}
.twk-seg button.active{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.12);color:var(--color-ink)}
.twk-fab{position:fixed;right:16px;bottom:16px;z-index:998;width:40px;height:40px;border-radius:50%;background:var(--color-surface-card);border:1px solid var(--color-hairline);box-shadow:var(--shadow-card);cursor:pointer;display:grid;place-items:center;color:var(--color-muted)}
.twk-fab:hover{background:var(--color-surface-cream-strong);color:var(--color-ink)}

/* ── Donut chart ── */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.donut-legend{flex:1;min-width:130px;display:flex;flex-direction:column;gap:8px}
.donut-legend-row{display:flex;align-items:center;gap:8px}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Scrollbar ── */
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:var(--color-hairline);border-radius:4px}

/* ── Responsive ── */
@media(max-width:1100px){
  .app{grid-template-columns:200px 1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .main{padding:24px}
  .section-grid.three{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:16px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .section-grid.two,.section-grid.three,.section-grid.l-r{grid-template-columns:1fr}
}
</style>
</head>

// ── Formatters ───────────────────────────────────────────────────────
function gbp(n,{compact=false,decimals}={}){
  const v=Number(n)||0;
  if(compact&&Math.abs(v)>=1000){
    if(Math.abs(v)>=1e6)return'£'+(v/1e6).toFixed(1)+'m';
    return'£'+(v/1000).toFixed(1)+'k';
  }
  const d=decimals!=null?decimals:(Number.isInteger(v)?0:2);
  return'£'+v.toLocaleString('en-GB',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtDate(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
function fmtDateShort(iso){if(!iso)return'—';return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function daysBetween(iso){if(!iso)return null;return Math.ceil((new Date(iso)-new Date())/(864e5))}
function uid(){return Math.random().toString(36).slice(2,9)}
function ordinal(n){if(n==null)return'—';const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

function loadStore(){
  try{
    const raw=localStorage.getItem(SK);
    if(!raw)return structuredClone(SEED);
    return{...structuredClone(SEED),...JSON.parse(raw)};
  }catch{return structuredClone(SEED)}
}
function saveStore(s){try{localStorage.setItem(SK,JSON.stringify(s))}catch{}}
function resetStore(){localStorage.removeItem(SK);return structuredClone(SEED)}

// ── Store context ─────────────────────────────────────────────────────
const StoreCtx=createContext(null);
function useStore(){return useContext(StoreCtx)}
function StoreProvider({children}){
  const[store,setRaw]=useState(()=>loadStore());
  const set=updater=>{setRaw(s=>{const next=typeof updater==='function'?updater(s):updater;saveStore(next);return next})};
  const ops=useMemo(()=>({
    addItem:(col,item)=>set(s=>({...s,[col]:[...s[col],{...item,id:item.id||uid()}]})),
    updateItem:(col,id,patch)=>set(s=>({...s,[col]:s[col].map(it=>it.id===id?{...it,...patch}:it)})),
    deleteItem:(col,id)=>set(s=>({...s,[col]:s[col].filter(it=>it.id!==id)})),
    reset:()=>setRaw(resetStore()),
  }),[]);
  return html`<${StoreCtx.Provider} value=${{store,set,...ops}}>${children}</${StoreCtx.Provider}>`;
}

// ── Icon ──────────────────────────────────────────────────────────────
function Icon({name,size=16,style:s={}}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.lucide)return;
    ref.current.innerHTML='';
    const el=document.createElement('i');
    el.setAttribute('data-lucide',name);
    ref.current.appendChild(el);
    window.lucide.createIcons({el:ref.current});
  },[name]);
  return html`<span ref=${ref} class="icon" style=${{display:'inline-flex',width:size,height:size,...s}}/>`;
}

// ── Stacked bar ───────────────────────────────────────────────────────
function StackBar({segments}){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;
  return html`<div>
    <div class="stack-bar">${segments.map((seg,i)=>html`<div key=${i} style=${{background:seg.color,width:(seg.value/total)*100+'%'}} title=${seg.label+': '+gbp(seg.value)}/>`)}</div>
    <div class="stack-legend">${segments.map((seg,i)=>html`<div key=${i}><span class="stack-legend-dot" style=${{background:seg.color}}/><span style=${{color:'var(--color-body)'}}>${seg.label}</span> <span class="muted-sm">${gbp(seg.value,{compact:true})}</span></div>`)}</div>
  </div>`;
}

// ── Donut chart ───────────────────────────────────────────────────────
function DonutChart({slices,size=180}){
  const total=slices.reduce((s,x)=>s+x.val,0);
  if(!total)return html`<div style="text-align:center;color:var(--color-muted);padding:20px">No data</div>`;
  const cx=size/2,cy=size/2,R=size*.42,r=size*.26;
  let angle=-Math.PI/2;
  const paths=slices.filter(x=>x.val>0).map(x=>{
    const sl=(x.val/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+sl),y2=cy+R*Math.sin(angle+sl);
    const ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    const ix2=cx+r*Math.cos(angle+sl),iy2=cy+r*Math.sin(angle+sl);
    const lg=sl>Math.PI?1:0;
    const d=`M ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${lg} 0 ${ix1} ${iy1} Z`;
    angle+=sl;
    return{d,col:x.col,label:x.label,val:x.val,pct:Math.round(x.val/total*100)};
  });
  return html`<div class="donut-wrap">
    <svg width=${size} height=${size} style="flex-shrink:0">
      ${paths.map(p=>html`<path key=${p.label} d=${p.d} fill=${p.col} stroke="var(--color-canvas)" stroke-width="2"/>`)}
      <text x=${cx} y=${cy-4} text-anchor="middle" fill="var(--color-ink)" font-size="13" font-weight="600" font-family="var(--font-sans)">${gbp(total,{compact:true})}</text>
      <text x=${cx} y=${cy+11} text-anchor="middle" fill="var(--color-muted)" font-size="10" font-family="var(--font-sans)">per month</text>
    </svg>
    <div class="donut-legend">
      ${paths.map(p=>html`<div key=${p.label} class="donut-legend-row">
        <div class="donut-dot" style=${{background:p.col}}/>
        <div style="flex:1;font-size:12px;color:var(--color-muted)">${p.label}</div>
        <div style="font-size:12px;font-weight:600">${gbp(p.val)}</div>
        <div style="font-size:11px;color:var(--color-muted);min-width:32px;text-align:right">${p.pct}%</div>
      </div>`)}
    </div>
  </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────────
function Modal({open,onClose,title,subtitle,children,actions,width}){
  useEffect(()=>{
    if(!open)return;
    const fn=e=>{if(e.key==='Escape')onClose()};
    document.addEventListener('keydown',fn);
    return()=>document.removeEventListener('keydown',fn);
  },[open,onClose]);
  if(!open)return null;
  return html`<div class="modal-backdrop" onClick=${onClose}>
    <div class="modal" style=${width?{width}:undefined} onClick=${e=>e.stopPropagation()}>
      <h3>${title}</h3>
      ${subtitle&&html`<p>${subtitle}</p>`}
      ${children}
      ${actions&&html`<div class="modal-actions">${actions}</div>`}
    </div>
  </div>`;
}

}

    const surplus=mInc-totalOut;

    const loanDebt=store.loans.reduce((s,l)=>s+l.outstanding,0);
    const investVal=store.investments.reduce((s,i)=>s+i.value,0);

function EmergencyView(){
  const{store}=useStore();
  const efBal=store.savings.reduce((s,x)=>s+x.balance,0);
  const mBills=store.bills.reduce((s,b)=>s+b.amount,0);

  const monthlyExp=mBills+mSubs;

  const target6=monthlyExp*6;
  const pct=Math.min(100,(efBal/target6)*100);
  const health=mosCovered>=6?{label:'Excellent',variant:'success',desc:'You have 6+ months covered — well done!'}
    :mosCovered>=3?{label:'Good',variant:'teal',desc:'3–6 months covered. Keep building.'}
    :mosCovered>=1?{label:'Low',variant:'warn',desc:'1–3 months covered. Aim for at least 3.'}
    :{label:'Critical',variant:'error',desc:'Less than 1 month covered. Prioritise this.'};
  const shortfall=Math.max(0,target6-efBal);
  return html`<${Fragment}>
    <${PageHeader} title="Emergency Fund" subtitle="How many months of expenses are you covered for?"/>
    <div class="kpi-grid three">
      <div class="card compact">
        <div class="card-eyebrow">Months covered</div>

      <${KPI} label="Total savings pot" value=${efBal} icon="piggy-bank"/>

    <div class="card" style="margin-bottom:24px">

        <div>
          <div class="card-title">Progress toward 6-month target</div>
          <div class="muted-sm mt-xs">${gbp(efBal)} of ${gbp(target6)}</div>
        </div>
        <span class=${'badge '+health.variant}>${health.label}</span>
      </div>
      <${Bar} pct=${pct} variant=${mosCovered>=6?'teal':mosCovered>=3?'teal':mosCovered>=1?'warn':'error'} thick/>
      <div class="row-between mt-sm">
        <div class="muted-sm">${pct.toFixed(0)}% of target</div>
        ${shortfall>0&&html`<div class="muted-sm">Still need <strong>${gbp(shortfall)}</strong></div>`}
      </div>
      <div style="margin-top:16px;padding:12px 16px;background:var(--color-surface-soft);border-radius:var(--radius-md);font-size:13px;color:var(--color-body)">
        💡 ${health.desc}
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Your savings accounts</div>
      <div class="section-subtitle">All accounts count toward your emergency cushion</div>
    </div>
    <div class="card">
      <div class="list">
        ${store.savings.map(s=>{
          const mosCov=monthlyExp>0?s.balance/monthlyExp:0;
          return html`<div key=${s.id} class="list-row" style="grid-template-columns:1fr 90px 110px 90px">
            <div>
              <div class="row-label">${s.name}</div>
              <div class="row-sub">${s.provider} · ${s.rate>0?s.rate.toFixed(2)+'% AER':'No interest'}</div>
            </div>
            <span class="badge">${s.type}</span>

            <div class="row-amount"><${Money} value=${s.balance}/></div>

    <div class="card" style="margin-top:16px">

        </div>
        <div>
          <div class="muted-sm">To reach 6-month target (${gbp(target6)})</div>
          <div class="serif" style="font-size:24px;margin-top:4px">${efBal>=target6?'✅ Already there!':gbp(shortfall)+' to go'}</div>

// ── RETIREMENT PLANNER VIEW ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
function RetirementView(){
  const{store,set}=useStore();
  const rt=store.retirement||{currentAge:47,retireAge:65,targetPot:750000,additionalMonthly:200};
  const update=(k,v)=>set(s=>({...s,retirement:{...s.retirement,[k]:v}}));

  const pensionPot=store.investments.filter(i=>i.type==='Pension'||i.type==='ISA').reduce((s,i)=>s+i.value,0);
  const allInvest=store.investments.reduce((s,i)=>s+i.value,0);
  const monthlyContrib=store.investments.reduce((s,i)=>s+i.monthly,0)+(rt.additionalMonthly||0);
  const yearsLeft=Math.max(0,rt.retireAge-rt.currentAge);
  const n=yearsLeft*12;

  function calcFV(rate){
    const r=rate/100/12;
    if(r===0)return allInvest+monthlyContrib*n;
    return allInvest*Math.pow(1+r,n)+monthlyContrib*(Math.pow(1+r,n)-1)/r;
  }

  const scenarios=[
    {label:'Conservative',rate:5, col:'#e8a55a'},
    {label:'Moderate',   rate:7, col:'#5db8a6'},
    {label:'Optimistic', rate:10,col:'#5db872'},
  ];

  return html`<${Fragment}>
    <${PageHeader} title="Retirement Planner" subtitle="Compound growth projections for your pension pot"/>

    <div class="kpi-grid three">
      <${KPI} label="Current pension & ISA pot" value=${pensionPot} icon="sun"/>
      <${KPI} label="Total portfolio" value=${allInvest} icon="line-chart"/>
      <${KPI} label="Monthly contributions" value=${monthlyContrib} icon="repeat"/>
    </div>

    <div class="card" style="margin-bottom:24px">
      <div class="card-eyebrow">Your details</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:8px">
        <div class="field">
          <label>Current age</label>
          <input type="number" value=${rt.currentAge} min="18" max="80" onInput=${e=>update('currentAge',+e.target.value)}/>
        </div>
        <div class="field">
          <label>Target retirement age</label>
          <input type="number" value=${rt.retireAge} min="40" max="90" onInput=${e=>update('retireAge',+e.target.value)}/>
        </div>
        <div class="field">
          <label>Target pot (£)</label>
          <input type="number" value=${rt.targetPot} onInput=${e=>update('targetPot',+e.target.value)}/>
        </div>
        <div class="field">
          <label>Extra monthly (£)</label>
          <input type="number" value=${rt.additionalMonthly} onInput=${e=>update('additionalMonthly',+e.target.value)}/>
        </div>
      </div>
      <div class="muted-sm" style="margin-top:8px">Years to retirement: <strong>${yearsLeft}</strong> · Total contributions over period: <strong>${gbp(monthlyContrib*n)}</strong></div>
    </div>

    <div class="section-header"><div class="section-title">Growth scenarios</div></div>
    <div class="section-grid three">
      ${scenarios.map(sc=>{
        const fv=calcFV(sc.rate);
        const onTrack=fv>=rt.targetPot;
        const pct=Math.min(100,fv/rt.targetPot*100);
        return html`<div key=${sc.label} class="card">
          <div class="row-between">
            <div class="card-eyebrow" style="margin-bottom:0">${sc.label}</div>
            <span class=${'badge '+(onTrack?'success':'warn')}>${sc.rate}% p.a.</span>
          </div>
          <div class="card-value" style=${{color:sc.col,marginTop:12}}><${Money} value=${fv}/></div>
          <div class="muted-sm mt-xs">projected at age ${rt.retireAge}</div>
          <${Bar} pct=${pct} variant=${onTrack?'teal':'warn'} thick/>
          <div class="row-between mt-sm">
            <div class="muted-sm">${pct.toFixed(0)}% of ${gbp(rt.targetPot,{compact:true})} target</div>
            <div class="muted-sm" style=${{color:onTrack?'var(--color-success)':'var(--color-warning)'}}>${onTrack?'On track ✓':'Short by '+gbp(rt.targetPot-fv,{compact:true})}</div>
          </div>
        </div>`;
      })}
    </div>

    <div class="section-header"><div class="section-title">Your investments</div></div>
    <div class="card">
      <div class="list">
        ${store.investments.map(i=>html`<div key=${i.id} class="list-row invest-row">
          <div>
            <div class="row-label">${i.name}</div>
            <div class="row-sub">${i.provider} · YTD ${i.ytdReturn>=0?'+':''}${i.ytdReturn}%</div>
          </div>
          <span class="badge">${i.type}</span>
          <div class="row-amount" style="font-size:14px"><${Money} value=${i.monthly}/>/mo</div>
          <div class="row-amount"><${Money} value=${i.value}/></div>
          <div/>
        </div>`)}
      </div>
    </div>
  </${Fragment}>`;
}

// ══════════════════════════════════════════════════════════════════════
// ── FAMILY MEMBERS VIEW ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
const PRESET_COLORS=['#cc785c','#5db8a6','#e8a55a','#7d8aa5','#a66c8b','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6'];
function FamilyView(){
  const{store,set}=useStore();
  const members=store.family||FAMILY;
  const[editing,setEditing]=useState(null);
  const saveM=m=>{
    const next=m.id
      ?members.map(x=>x.id===m.id?m:x)
      :[...members,{...m,id:uid()}];
    set(s=>({...s,family:next}));
    setEditing(null);
  };
  const delM=id=>set(s=>({...s,family:members.filter(x=>x.id!==id)}));

  const{store:st}=useStore();
  const incomeByMember=id=>st.income.filter(i=>i.owner===id).reduce((s,i)=>s+(i.frequency==='monthly'?i.amount:i.amount/12),0);
  const billsByMember=id=>st.bills.filter(b=>b.owner===id).reduce((s,b)=>s+b.amount,0);

  return html`<${Fragment}>
    <${PageHeader} title="Family members" subtitle=${members.length+' people in your household'}
      action=${html`<button class="btn btn-primary" onClick=${()=>setEditing({role:'Child',color:'#7d8aa5'})}><${Icon} name="plus" size=${14}/> Add member</button>`}/>

    <div class="section-grid two">
      ${members.map(m=>{
        const inc=incomeByMember(m.id);
        const bil=billsByMember(m.id);
        return html`<div key=${m.id} class="card">
          <div class="row-between" style="align-items:flex-start">
            <div class="row gap-md">
              <div style=${{width:48,height:48,borderRadius:'50%',background:m.color,display:'grid',placeItems:'center',fontSize:20,fontWeight:700,color:'#fff',fontFamily:'var(--font-sans)',flexShrink:0}}>${m.name[0]}</div>
              <div>
                <div style="font-family:var(--font-serif);font-size:20px">${m.name}</div>
                <span class="badge" style="margin-top:4px">${m.role}</span>
              </div>
            </div>
            <div class="row gap-xs">
              <button class="btn btn-ghost btn-icon" onClick=${()=>setEditing(m)}><${Icon} name="pencil" size=${14}/></button>
              <${ConfirmBtn} onConfirm=${()=>delM(m.id)}/>
            </div>
          </div>
          ${(inc>0||bil>0)&&html`<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--color-hairline-soft);display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${inc>0&&html`<div><div class="muted-sm">Monthly income</div><div class="serif" style="font-size:20px;color:var(--color-success)"><${Money} value=${inc}/></div></div>`}
            ${bil>0&&html`<div><div class="muted-sm">Monthly bills</div><div class="serif" style="font-size:20px;color:var(--color-error)"><${Money} value=${bil}/></div></div>`}
          </div>`}
        </div>`;
      })}
    </div>

    <${MemberEditor} open=${editing!=null} member=${editing} onClose=${()=>setEditing(null)} onSave=${saveM}/>
  </${Fragment}>`;
}
function MemberEditor({open,member,onClose,onSave}){
  const[f,setF]=useState({});
  useEffect(()=>{setF(member||{role:'Child',color:'#7d8aa5'})},[member,open]);
  if(!open)return null;
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  return html`<${Modal} open=${open} onClose=${onClose} title=${member?.id?'Edit member':'Add a family member'}
    actions=${html`<${Fragment}><button class="btn btn-secondary" onClick=${onClose}>Cancel</button><button class="btn btn-primary" onClick=${()=>onSave(f)} disabled=${!f.name}>Save</button></${Fragment}>`}>
    <${Field} label="Name"><${TxtIn} value=${f.name} onChange=${v=>u('name',v)} placeholder="Kuldip"/></${Field}>
    <${Field} label="Role"><${Sel} value=${f.role||'Child'} onChange=${v=>u('role',v)} options=${['Parent','Child','Other']}/></${Field}>
    <${Field} label="Colour">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        ${PRESET_COLORS.map(c=>html`<button key=${c} onClick=${()=>u('color',c)} style=${{width:32,height:32,borderRadius:'50%',border:'none',cursor:'pointer',background:c,outline:f.color===c?'3px solid var(--color-ink)':'none',outlineOffset:'2px'}}/>`)}
      </div>
    </${Field}>
  </${Modal}>`;
}

// ══════════════════════════════════════════════════════════════════════
// ── SIDEBAR ───────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
const NAV=[
  {id:'overview',    label:'Overview',       icon:'layout-dashboard'},
  {id:'income',      label:'Income',         icon:'trending-up'},
  {id:'cards',       label:'Credit cards',   icon:'credit-card'},
  {id:'bills',       label:'Monthly bills',  icon:'receipt'},
  {id:'subscriptions',label:'Subscriptions', icon:'repeat'},
  {id:'investments', label:'Investments',    icon:'line-chart'},
  {id:'savings',     label:'Savings',        icon:'piggy-bank'},
  {id:'loans',       label:'Loans',          icon:'banknote'},
  {id:'trips',       label:'Trips',          icon:'plane'},
  {id:'emergency',   label:'Emergency Fund', icon:'shield'},
  {id:'retirement',  label:'Retirement',     icon:'sun'},
  {id:'family',      label:'Family members', icon:'users'},
];
// Inline spike-mark SVG as brand icon
const SPIKE_SVG=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="28" height="28"><g fill="#cc785c"><path d="M32 4C33.6 16 34.6 22 36 30 34.7 30.6 33.4 31 32 31 30.6 31 29.3 30.6 28 30 29.4 22 30.4 16 32 4Z"/><path d="M32 60C30.4 48 29.4 42 28 34 29.3 33.4 30.6 33 32 33 33.4 33 34.7 33.4 36 34 34.6 42 33.6 48 32 60Z"/><path d="M4 32C16 30.4 22 29.4 30 28 30.6 29.3 31 30.6 31 32 31 33.4 30.6 34.7 30 36 22 34.6 16 33.6 4 32Z"/><path d="M60 32C48 33.6 42 34.6 34 36 33.4 34.7 33 33.4 33 32 33 30.6 33.4 29.3 34 28 42 29.4 48 30.4 60 32Z"/></g></svg>`;

function Sidebar({route,onNavigate}){
  const{store}=useStore();
  const counts={cards:store.cards.length,bills:store.bills.length,subscriptions:store.subscriptions.length,investments:store.investments.length,savings:store.savings.length,loans:store.loans.length,trips:store.trips.length,income:store.income.length,family:(store.family||FAMILY).length};
  return html`<aside class="sidebar">
    <div class="brand">
      <span dangerouslySetInnerHTML=${{__html:SPIKE_SVG}}/>
      <div class="col">
        <div class="brand-name">Kudhail family</div>
        <div class="brand-sub">Finance tracker</div>
      </div>
    </div>
    <nav class="nav">
      ${NAV.map(n=>html`<button key=${n.id} class=${'nav-item'+(route===n.id?' active':'')} onClick=${()=>onNavigate(n.id)}>
        <${Icon} name=${n.icon} size=${16}/>
        ${n.label}
        ${counts[n.id]!=null&&html`<span class="nav-item-count">${counts[n.id]}</span>`}
      </button>`)}
    </nav>
    <div class="family-list">
      <div class="nav-section-label">Household</div>
      ${(store.family||FAMILY).map(m=>html`<div key=${m.id} class="family-item">
        <${Avatar} memberId=${m.id} size=${26}/>
        <div class="col" style="line-height:1.2">
          <span>${m.name}</span>
          <span style="font-size:11px;color:var(--color-muted)">${m.role}</span>
        </div>
      </div>`)}
    </div>
  </aside>`;
}

// ══════════════════════════════════════════════════════════════════════
// ── TWEAKS PANEL ──────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
const ACCENTS=['#cc785c','#5db8a6','#e8a55a','#7d8aa5','#a66c8b','#3b82f6'];
function TweaksFab({onClick}){
  return html`<button class="twk-fab" onClick=${onClick} title="Tweaks">
    <${Icon} name="settings" size=${16}/>
  </button>`;
}
function TweaksPanel({tweaks,setTweak,reset,onClose}){
  return html`<div class="twk-panel">
    <div class="twk-hd">
      <b>Tweaks</b>
      <button class="twk-x" onClick=${onClose}>✕</button>
    </div>
    <div class="twk-body">
      <div class="twk-sect">Accent colour</div>
      <div class="twk-chips">
        ${ACCENTS.map(a=>html`<button key=${a} class=${'twk-chip'+(tweaks.accent===a?' active':'')} style=${{background:a}} onClick=${()=>setTweak('accent',a)} title=${a}/>`)}
      </div>
      <div class="twk-sect">Density</div>
      <div class="twk-seg">
        ${['compact','regular','comfy'].map(d=>html`<button key=${d} class=${tweaks.density===d?'active':''} onClick=${()=>setTweak('density',d)}>${d}</button>`)}
      </div>
      <div class="twk-sect">Privacy</div>
      <div class="twk-row">
        <span class="twk-lbl">Hide balances</span>
        <button class="twk-toggle" data-on=${tweaks.privacy?'1':'0'} onClick=${()=>setTweak('privacy',!tweaks.privacy)}><i/></button>
      </div>
      <div class="twk-sect">Data</div>
      <button class="btn btn-ghost" style="font-size:12px;padding:6px 10px;width:100%;justify-content:flex-start" onClick=${reset}>
        <${Icon} name="rotate-ccw" size=${12}/> Reset to seed data
      </button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════════
// ── APP ───────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════
function getRoute(){const h=(window.location.hash||'').replace(/^#/,'');return NAV.find(n=>n.id===h)?h:'overview'}

function App(){
  const[route,setRoute]=useState(getRoute);
  const[tweaks,setTweaksRaw]=useState({accent:'#cc785c',density:'regular',privacy:false});
  const[tweakOpen,setTweakOpen]=useState(false);
  const{reset}=useStore();

  const setTweak=(k,v)=>setTweaksRaw(p=>({...p,[k]:v}));

  useEffect(()=>{
    const fn=()=>setRoute(getRoute());
    window.addEventListener('hashchange',fn);
    return()=>window.removeEventListener('hashchange',fn);
  },[]);

  const navigate=id=>{window.location.hash=id;setRoute(id)};

  // Apply accent colour
  useEffect(()=>{
    document.documentElement.style.setProperty('--color-primary',tweaks.accent);
    document.documentElement.style.setProperty('--color-primary-active',tweaks.accent+'cc');
  },[tweaks.accent]);

  return html`<${TweakCtx.Provider} value=${tweaks}>
    <div class="app">
      <${Sidebar} route=${route} onNavigate=${navigate}/>
      <main class=${'main'+(tweaks.density==='compact'?' dense':'')}>
        ${route==='overview'      &&html`<${OverviewView}    navigate=${navigate}/>`}
        ${route==='income'        &&html`<${IncomeView}/>`}
        ${route==='cards'         &&html`<${CardsView}/>`}
        ${route==='bills'         &&html`<${BillsView}/>`}
        ${route==='subscriptions' &&html`<${SubsView}/>`}
        ${route==='investments'   &&html`<${InvestmentsView}/>`}
        ${route==='savings'       &&html`<${SavingsView}/>`}
        ${route==='loans'         &&html`<${LoansView}/>`}
        ${route==='trips'         &&html`<${TripsView}/>`}
        ${route==='emergency'     &&html`<${EmergencyView}/>`}
        ${route==='retirement'    &&html`<${RetirementView}/>`}
        ${route==='family'        &&html`<${FamilyView}/>`}
      </main>
    </div>
    ${tweakOpen
      ?html`<${TweaksPanel} tweaks=${tweaks} setTweak=${setTweak} reset=${()=>{reset();setTweakOpen(false)}} onClose=${()=>setTweakOpen(false)}/>`
      :html`<${TweaksFab} onClick=${()=>setTweakOpen(true)}/>`
    }
  </${TweakCtx.Provider}>`;
}

function Root(){
  return html`<${StoreProvider}><${App}/></${StoreProvider}>`;
}
render(html`<${Root}/>`,document.getElementById('root'));

// Re-init lucide after render
setTimeout(()=>window.lucide&&window.lucide.createIcons(),300);
new MutationObserver(()=>window.lucide&&window.lucide.createIcons()).observe(document.body,{childList:true,subtree:true});
</script>
</body>
</html>
