<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kudhail Family Finance Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#1e293b}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
input,select,textarea{background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:8px 12px;width:100%;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:#3b82f6}
input::placeholder{color:#64748b}
select option{background:#1e293b}
button{cursor:pointer;transition:all .15s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.m-box{animation:mIn .18s ease}
.nav-item{border-left:3px solid transparent;display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:14px;width:100%;text-align:left;background:none;border-top:none;border-right:none;border-bottom:none;color:#94a3b8;cursor:pointer;transition:all .12s}
.nav-item.active{border-left-color:#3b82f6;background:rgba(59,130,246,.12);color:#fff}
.nav-item:hover:not(.active){background:rgba(255,255,255,.05);color:#e2e8f0}
.scard{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;transition:transform .18s,box-shadow .18s}
.scard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.pt{background:#334155;border-radius:99px;overflow:hidden}
.pf{border-radius:99px;transition:width .5s ease}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;color:#94a3b8;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #334155}
td{padding:11px 14px;border-bottom:1px solid #1e293b;font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px;font-weight:500}
.fg{display:grid;gap:12px}
.fg2{grid-template-columns:1fr 1fr}
.fg3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:640px){.fg2,.fg3{grid-template-columns:1fr}}
</style>
</head>
<body class="bg-slate-900 text-slate-100">
<div id="root"></div>
<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10.22.0';
import{useState,useEffect,useMemo}from'https://esm.sh/preact@10.22.0/hooks';
import htm from'https://esm.sh/htm@3.1.1';
const html=htm.bind(h);

// ── UTILS ─────────────────────────────────────────────────────────────────
const fmt=n=>{if(n==null||isNaN(n))return'£0.00';return'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})};
const fmtK=n=>{if(n==null||isNaN(n))return'£0';const a=Math.abs(n);if(a>=1e6)return'£'+(n/1e6).toFixed(1)+'m';if(a>=1e3)return'£'+(n/1e3).toFixed(1)+'k';return'£'+Math.round(n).toLocaleString('en-GB')};
const toM=(a,f)=>{const v=parseFloat(a)||0;if(f==='weekly')return v*52/12;if(f==='biweekly')return v*26/12;if(f==='yearly')return v/12;return v};
const uid=()=>Math.random().toString(36).slice(2);
const calcFV=(pv,pmt,r,y)=>{const mo=r/12,n=y*12;if(mo===0)return pv+pmt*n;return pv*Math.pow(1+mo,n)+pmt*((Math.pow(1+mo,n)-1)/mo)};
const reqPMT=(pv,t,r,y)=>{const mo=r/12,n=y*12;const fv=pv*Math.pow(1+mo,n);const rem=t-fv;if(rem<=0)return 0;if(mo===0)return rem/n;return rem*mo/(Math.pow(1+mo,n)-1)};
const mUntil=d=>{if(!d)return 0;const dt=new Date(d),now=new Date();return Math.max(0,(dt.getFullYear()-now.getFullYear())*12+(dt.getMonth()-now.getMonth()))};

// ── DEFAULT DATA ──────────────────────────────────────────────────────────
const DEF_MEMBERS=[
  {id:'kuldip', name:'Kuldip',   color:'#3b82f6',initials:'KK',role:'Parent'},
  {id:'jasleen',name:'Jasleen',  color:'#ec4899',initials:'JK',role:'Parent'},
  {id:'nirvaan',name:'Nirvaan',  color:'#10b981',initials:'NK',role:'Child'},
  {id:'archan', name:'Archan',   color:'#f59e0b',initials:'AK',role:'Child'},
  {id:'child3', name:'Child 3',  color:'#8b5cf6',initials:'CK',role:'Child'},
  {id:'household',name:'Household',color:'#64748b',initials:'HH',role:'Shared'},
];
const DEF_BILLS=[
  {id:uid(),pid:'household',name:'Mortgage',                  cat:'Home',      amt:1950.25,freq:'monthly'},
  {id:uid(),pid:'household',name:'Buildings & Contents Ins.', cat:'Home',      amt:1950,   freq:'yearly'},
  {id:uid(),pid:'household',name:'Council Tax',               cat:'Home',      amt:349,    freq:'monthly'},
  {id:uid(),pid:'household',name:'Water Rates',               cat:'Home',      amt:32,     freq:'monthly'},
  {id:uid(),pid:'household',name:'Gas',                       cat:'Home',      amt:150,    freq:'monthly'},
  {id:uid(),pid:'household',name:'Internet',                  cat:'Home',      amt:40,     freq:'monthly'},
  {id:uid(),pid:'household',name:'TV Licence',                cat:'Home',      amt:174.5,  freq:'yearly'},
  {id:uid(),pid:'household',name:'Mobile Phone',              cat:'Home',      amt:45,     freq:'monthly'},
  {id:uid(),pid:'household',name:'Alarm Service',             cat:'Home',      amt:250,    freq:'yearly'},
  {id:uid(),pid:'household',name:'Life Insurance',            cat:'Insurance', amt:33.33,  freq:'monthly'},
  {id:uid(),pid:'household',name:'Metro Bank Insurance',      cat:'Insurance', amt:43.75,  freq:'monthly'},
  {id:uid(),pid:'household',name:'Food & Household Shopping', cat:'Food',      amt:150,    freq:'weekly'},
  {id:uid(),pid:'household',name:'Eating Out',                cat:'Food',      amt:250,    freq:'monthly'},
  {id:uid(),pid:'household',name:'Coffees & Snacks',          cat:'Food',      amt:20,     freq:'weekly'},
  {id:uid(),pid:'kuldip',   name:'Meals at Work',             cat:'Food',      amt:20,     freq:'weekly'},
  {id:uid(),pid:'household',name:'National Trust',            cat:'Food',      amt:13.25,  freq:'monthly'},
  {id:uid(),pid:'kuldip',   name:'Rail / Bus / Coach',        cat:'Transport', amt:90,     freq:'weekly'},
  {id:uid(),pid:'household',name:'Car Maintenance / Lease',   cat:'Transport', amt:563.71, freq:'monthly'},
  {id:uid(),pid:'household',name:'Car Insurance',             cat:'Transport', amt:674.43, freq:'yearly'},
  {id:uid(),pid:'household',name:'Petrol / Diesel',           cat:'Transport', amt:250,    freq:'monthly'},
  {id:uid(),pid:'household',name:'Gap Car Insurance',         cat:'Transport', amt:50,     freq:'yearly'},
  {id:uid(),pid:'jasleen',  name:'Jasleen Coach',             cat:'Transport', amt:1400,   freq:'yearly'},
  {id:uid(),pid:'household',name:'School Meals',              cat:'Family',    amt:10,     freq:'weekly'},
  {id:uid(),pid:'household',name:'School Trips',              cat:'Family',    amt:200,    freq:'yearly'},
  {id:uid(),pid:'household',name:'TTW',                       cat:'Family',    amt:645,    freq:'yearly'},
  {id:uid(),pid:'household',name:'Netball',                   cat:'Family',    amt:300,    freq:'yearly'},
  {id:uid(),pid:'household',name:'Gymnastics',                cat:'Family',    amt:100,    freq:'yearly'},
  {id:uid(),pid:'household',name:'Swimming',                  cat:'Family',    amt:135,    freq:'monthly'},
  {id:uid(),pid:'household',name:'Piano Lessons',             cat:'Family',    amt:6,      freq:'weekly'},
  {id:uid(),pid:'household',name:'Karate',                    cat:'Family',    amt:62.5,   freq:'monthly'},
  {id:uid(),pid:'household',name:'Cinema / Theatre',          cat:'Leisure',   amt:50,     freq:'monthly'},
  {id:uid(),pid:'household',name:'Sky / Satellite TV',        cat:'Leisure',   amt:70,     freq:'yearly'},
  {id:uid(),pid:'nirvaan',  name:'Nirvaan School Activities', cat:'Family',    amt:75,     freq:'yearly'},
  {id:uid(),pid:'archan',   name:'Archan School Activities',  cat:'Family',    amt:125,    freq:'yearly'},
  {id:uid(),pid:'nirvaan',  name:'First Soccer',              cat:'Family',    amt:135,    freq:'yearly'},
];
const DEF_SUBS=[
  {id:uid(),name:'Netflix',             amt:17.99,freq:'monthly',cat:'Entertainment'},
  {id:uid(),name:'Spotify',             amt:11.99,freq:'monthly',cat:'Entertainment'},
  {id:uid(),name:'Amazon Prime',        amt:8.99, freq:'monthly',cat:'Entertainment'},
  {id:uid(),name:'Disney+',             amt:4.99, freq:'monthly',cat:'Entertainment'},
  {id:uid(),name:'Claude AI (Anthropic)',amt:18,  freq:'monthly',cat:'AI Tools'},
  {id:uid(),name:'Microsoft 365',       amt:8.33, freq:'monthly',cat:'Software'},
  {id:uid(),name:'iCloud Storage',      amt:2.99, freq:'monthly',cat:'Software'},
];
const SK='kudhail_v4';
const load=()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null}catch(e){return null}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d))}catch(e){}};

// ── UI ATOMS ──────────────────────────────────────────────────────────────
const Btn=({children,onClick,variant='primary',size='md',cls='',type='button',...rest})=>{
  const sz=size==='sm'?'px-3 py-1.5 text-xs':size==='lg'?'px-6 py-3 text-base':'px-4 py-2 text-sm';
  const v={
    primary:'bg-blue-600 hover:bg-blue-500 text-white',
    danger:'bg-red-900/40 hover:bg-red-800/60 text-red-400 border border-red-700/40',
    ghost:'bg-transparent hover:bg-white/5 text-slate-300 border border-slate-700',
    success:'bg-emerald-600 hover:bg-emerald-500 text-white'
  }[variant]||'bg-blue-600 text-white';
  return html`<button type=${type} onClick=${onClick} class=${'rounded-lg font-semibold focus:outline-none '+sz+' '+v+' '+cls} ...${rest}>${children}</button>`;
};

const Card=({children,cls=''})=>html`<div class=${'bg-slate-800 border border-slate-700 rounded-xl '+cls}>${children}</div>`;

const Badge=({m})=>html`<span class="chip" style=${'background:'+m.color+'22;color:'+m.color}>${m.name}</span>`;

const Avatar=({m,sz=8})=>html`<div class=${`flex-shrink-0 rounded-full flex items-center justify-center text-xs font-bold`} style=${'width:'+sz*4+'px;height:'+sz*4+'px;background:'+m.color+'33;color:'+m.color}>${m.initials}</div>`;

const FreqBadge=({f})=>{
  const lb={monthly:'Monthly',weekly:'Weekly',biweekly:'Fortnightly',yearly:'Yearly'};
  return html`<span class="chip" style="background:#334155;color:#94a3b8">${lb[f]||f}</span>`;
};

const CatBadge=({cat})=>{
  const cs={Home:'#3b82f6',Insurance:'#8b5cf6',Food:'#f59e0b',Transport:'#10b981',Family:'#ec4899',Leisure:'#f97316',Entertainment:'#ec4899','AI Tools':'#06b6d4',Software:'#6366f1',Other:'#64748b'};
  const c=cs[cat]||'#64748b';
  return html`<span class="chip" style=${'background:'+c+'22;color:'+c}>${cat}</span>`;
};

const StatCard=({label,value,sub,color='blue',icon})=>{
  const tc={blue:'#60a5fa',green:'#34d399',red:'#f87171',amber:'#fbbf24',purple:'#a78bfa',pink:'#f472b6'}[color]||'#60a5fa';
  return html`<div class="scard fade-in">
    <div class="flex items-start justify-between mb-1">
      <span class="text-xs" style="color:#94a3b8">${label}</span>
      <span style="font-size:18px">${icon||''}</span>
    </div>
    <div class="text-2xl font-bold" style=${'color:'+tc}>${value}</div>
    ${sub&&html`<div class="text-xs mt-1" style="color:#64748b">${sub}</div>`}
  </div>`;
};

const Empty=({text})=>html`<div class="text-center py-12" style="color:#64748b"><div style="font-size:32px;margin-bottom:8px">📭</div><p class="text-sm">${text}</p></div>`;

const SectionHead=({title,btn})=>html`<div class="flex items-center justify-between mb-5">
  <h1 class="text-2xl font-bold">${title}</h1>
  ${btn}
</div>`;

const Modal=({title,onClose,children,wide})=>html`
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,.75)">
    <div class=${'m-box border border-slate-700 rounded-2xl shadow-2xl w-full max-h-[90vh] overflow-y-auto '+(wide?'max-w-2xl':'max-w-lg')} style="background:#1e293b">
      <div class="flex items-center justify-between p-5 border-b border-slate-700">
        <h3 class="font-semibold text-lg">${title}</h3>
        <button onClick=${onClose} style="background:none;border:none;color:#94a3b8;font-size:24px;line-height:1;cursor:pointer" onMouseOver=${e=>e.target.style.color='#fff'} onMouseOut=${e=>e.target.style.color='#94a3b8'}>×</button>
      </div>
      <div class="p-5">${children}</div>
    </div>
  </div>`;

const PersonFilter=({members,sel,onChange})=>html`
  <div class="flex flex-wrap gap-2 mb-5">
    <button onClick=${()=>onChange('all')} style=${'padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;border:none;cursor:pointer;'+(sel==='all'?'background:#3b82f6;color:#fff':'background:#334155;color:#94a3b8')}>All</button>
    ${members.map(m=>html`<button key=${m.id} onClick=${()=>onChange(m.id)} style=${'padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:'+(sel===m.id?m.color:m.color+'22')+';color:'+(sel===m.id?'#fff':m.color)}>${m.name}</button>`)}
  </div>`;

const FREQS=['weekly','biweekly','monthly','yearly'];
const FLABEL={weekly:'Weekly',biweekly:'Fortnightly',monthly:'Monthly',yearly:'Yearly'};

// ── INCOME ────────────────────────────────────────────────────────────────
const ICATS=['Salary','Rental Income','Dividends','Side Hustle','Benefits','Other'];
function IncomePage({members,income,setIncome,sel}){
  const[show,setShow]=useState(false);
  const[eid,setEid]=useState(null);
  const blank={pid:'kuldip',name:'',cat:'Salary',amt:'',freq:'monthly'};
  const[f,setF]=useState(blank);
  const openAdd=()=>{setEid(null);setF(blank);setShow(true)};
  const openEdit=r=>{setEid(r.id);setF({pid:r.pid,name:r.name,cat:r.cat,amt:r.amt,freq:r.freq});setShow(true)};
  const saveFn=()=>{if(!f.name||!f.amt)return;const d={...f,amt:parseFloat(f.amt)};if(eid)setIncome(p=>p.map(x=>x.id===eid?{...x,...d}:x));else setIncome(p=>[...p,{id:uid(),...d}]);setShow(false)};
  const del=id=>setIncome(p=>p.filter(x=>x.id!==id));
  const totalM=income.reduce((s,x)=>s+toM(x.amt,x.freq),0);
  const groups=members.filter(m=>m.role!=='Shared').map(m=>({m,items:income.filter(x=>x.pid===m.id)})).filter(g=>g.items.length>0||(sel==='all'));
  const vis=sel==='all'?groups:groups.filter(g=>g.m.id===sel);
  return html`<div class="fade-in space-y-5">
    <${SectionHead} title="Income Tracker" btn=${html`<${Btn} onClick=${openAdd}>+ Add Income</>`}/>
    <p style="color:#94a3b8;font-size:14px;margin-top:-12px">Total monthly: <span style="color:#34d399;font-weight:700">${fmt(totalM)}</span> · <span style="color:#6ee7b7">${fmt(totalM*12)}/yr</span></p>
    ${income.length===0&&html`<${Empty} text="No income added yet. Click '+ Add Income' to get started."/>`}
    ${vis.filter(g=>g.items.length>0).map(({m,items})=>html`<${Card} key=${m.id}>
      <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-700">
        <${Avatar} m=${m} sz=${9}/>
        <div>
          <div class="font-semibold">${m.name}</div>
          <div class="text-sm" style="color:#34d399">${fmt(items.reduce((s,x)=>s+toM(x.amt,x.freq),0))}/mo · ${fmt(items.reduce((s,x)=>s+toM(x.amt,x.freq),0)*12)}/yr</div>
        </div>
      </div>
      <div style="overflow-x:auto">
      <table><thead><tr><th>Source</th><th>Category</th><th>Amount</th><th>Frequency</th><th>Monthly</th><th></th></tr></thead>
      <tbody>${items.map(x=>html`<tr key=${x.id}>
        <td class="font-medium">${x.name}</td>
        <td><${CatBadge} cat=${x.cat}/></td>
        <td>${fmt(x.amt)}</td>
        <td><${FreqBadge} f=${x.freq}/></td>
        <td class="font-bold" style="color:#34d399">${fmt(toM(x.amt,x.freq))}</td>
        <td><div class="flex gap-2"><${Btn} size="sm" variant="ghost" onClick=${()=>openEdit(x)}>Edit</><${Btn} size="sm" variant="danger" onClick=${()=>del(x.id)}>Del</></div></td>
      </tr>`)}</tbody></table></div>
    </>`)}
    ${show&&html`<${Modal} title=${eid?'Edit Income':'Add Income'} onClose=${()=>setShow(false)}>
      <div class="space-y-4">
        <div class="fg fg2">
          <div><label>Person</label><select value=${f.pid} onChange=${e=>setF(p=>({...p,pid:e.target.value}))}>${members.filter(m=>m.role!=='Shared').map(m=>html`<option key=${m.id} value=${m.id}>${m.name}</option>`)}</select></div>
          <div><label>Category</label><select value=${f.cat} onChange=${e=>setF(p=>({...p,cat:e.target.value}))}>${ICATS.map(c=>html`<option key=${c}>${c}</option>`)}</select></div>
        </div>
        <div><label>Name / Source</label><input placeholder="e.g. Main Salary" value=${f.name} onInput=${e=>setF(p=>({...p,name:e.target.value}))}/></div>
        <div class="fg fg2">
          <div><label>Amount (£)</label><input type="number" placeholder="0.00" value=${f.amt} onInput=${e=>setF(p=>({...p,amt:e.target.value}))}/></div>
          <div><label>Frequency</label><select value=${f.freq} onChange=${e=>setF(p=>({...p,freq:e.target.value}))}>${FREQS.map(v=>html`<option key=${v} value=${v}>${FLABEL[v]}</option>`)}</select></div>
        </div>
        ${f.amt&&html`<p style="font-size:13px;color:#94a3b8">≈ <span style="color:#34d399;font-weight:700">${fmt(toM(f.amt,f.freq))}</span>/month</p>`}
        <div class="flex gap-3 pt-2"><${Btn} onClick=${saveFn} cls="flex-1">Save</><${Btn} variant="ghost" onClick=${()=>setShow(false)} cls="flex-1">Cancel</></div>
      </div>
    </>`}
  </div>`;
}

// ── BILLS ─────────────────────────────────────────────────────────────────
const BCATS=['Home','Insurance','Food','Transport','Family','Leisure','Health','Other'];
function BillsPage({members,bills,setBills,sel}){
  const[show,setShow]=useState(false);
  const[eid,setEid]=useState(null);
  const[fcat,setFcat]=useState('all');
  const blank={pid:'household',name:'',cat:'Home',amt:'',freq:'monthly'};
  const[f,setF]=useState(blank);
  const openAdd=()=>{setEid(null);setF(blank);setShow(true)};
  const openEdit=r=>{setEid(r.id);setF({pid:r.pid,name:r.name,cat:r.cat,amt:r.amt,freq:r.freq});setShow(true)};
  const saveFn=()=>{if(!f.name||!f.amt)return;const d={...f,amt:parseFloat(f.amt)};if(eid)setBills(p=>p.map(x=>x.id===eid?{...x,...d}:x));else setBills(p=>[...p,{id:uid(),...d}]);setShow(false)};
  const del=id=>setBills(p=>p.filter(x=>x.id!==id));
  const gm=id=>members.find(m=>m.id===id)||members[members.length-1];
  let vis=bills;
  if(sel!=='all')vis=vis.filter(x=>x.pid===sel||x.pid==='household');
  if(fcat!=='all')vis=vis.filter(x=>x.cat===fcat);
  const total=vis.reduce((s,x)=>s+toM(x.amt,x.freq),0);
  const cats=[...new Set(bills.map(b=>b.cat))];
  return html`<div class="fade-in space-y-5">
    <${SectionHead} title="Monthly Bills" btn=${html`<${Btn} onClick=${openAdd}>+ Add Bill</>`}/>
    <p style="color:#94a3b8;font-size:14px;margin-top:-12px">Showing: <span style="color:#f87171;font-weight:700">${fmt(total)}/mo</span> · ${fmt(total*12)}/yr</p>
    <div class="flex flex-wrap gap-2">
      ${['all',...cats].map(c=>html`<button key=${c} onClick=${()=>setFcat(c)} style=${'padding:4px 12px;border-radius:99px;font-size:12px;font-weight:600;border:none;cursor:pointer;'+(fcat===c?'background:#475569;color:#fff':'background:#1e293b;color:#94a3b8')}>${c==='all'?'All':c}</button>`)}
    </div>
    <${Card}>
      ${vis.length===0?html`<div class="p-8"><${Empty} text="No bills match this filter."/></div>`:html`
      <div style="overflow-x:auto">
      <table><thead><tr><th>Bill</th><th>Person</th><th>Category</th><th>Amount</th><th>Freq</th><th>Monthly</th><th></th></tr></thead>
      <tbody>
        ${vis.map(x=>{const m=gm(x.pid);return html`<tr key=${x.id}>
          <td class="font-medium">${x.name}</td><td><${Badge} m=${m}/></td><td><${CatBadge} cat=${x.cat}/></td>
          <td>${fmt(x.amt)}</td><td><${FreqBadge} f=${x.freq}/></td>
          <td class="font-bold" style="color:#f87171">${fmt(toM(x.amt,x.freq))}</td>
          <td><div class="flex gap-2"><${Btn} size="sm" variant="ghost" onClick=${()=>openEdit(x)}>Edit</><${Btn} size="sm" variant="danger" onClick=${()=>del(x.id)}>Del</></div></td>
        </tr>`})}
        <tr><td colspan="5" class="text-right font-bold text-sm" style="color:#94a3b8">Total Monthly</td><td class="font-bold" style="color:#f87171;font-size:16px">${fmt(total)}</td><td></td></tr>

  const saveFn=()=>{if(!f.name)return;const d={...f,balance:parseFloat(f.balance)||0,monthlyPmt:parseFloat(f.monthlyPmt)||0,rate:parseFloat(f.rate)||0};if(eid)setLoans(p=>p.map(x=>x.id===eid?{...x,...d}:x));else setLoans(p=>[...p,{id:uid(),...d}]);setShow(false)};

  const gm=id=>members.find(m=>m.id===id)||members[0];

    if(pmt<=0)return'—';
    if(rate===0)return Math.ceil(bal/pmt)+' months';

    return d.toLocaleDateString('en-GB',{month:'short',year:'numeric'})+' ('+n+'mo)';

    <${SectionHead} title="Loans" btn=${html`<${Btn} onClick=${openAdd}>+ Add Loan</>`}/>

        <div><div style="font-size:11px;color:#64748b">Interest Rate</div><div class="font-bold">${l.rate}%</div></div>
        <div><div style="font-size:11px;color:#64748b">Est. Payoff</div><div class="font-semibold text-sm" style="color:#34d399">${calcPayoff(l.balance,l.monthlyPmt,l.rate)}</div></div>
      </div>
    </>`})}
    ${show&&html`<${Modal} title=${eid?'Edit Loan':'Add Loan'} onClose=${()=>setShow(false)}>
      <div class="space-y-4">
        <div class="fg fg2">
          <div><label>Person</label><select value=${f.pid} onChange=${e=>setF(p=>({...p,pid:e.target.value}))}>${members.filter(m=>m.role!=='Shared').map(m=>html`<option key=${m.id} value=${m.id}>${m.name}</option>`)}</select></div>
          <div><label>Loan Name</label><input placeholder="e.g. Car Finance" value=${f.name} onInput=${e=>setF(p=>({...p,name:e.target.value}))}/></div>
        </div>
        <div class="fg fg2">
          <div><label>Outstanding Balance (£)</label><input type="number" placeholder="0.00" value=${f.balance} onInput=${e=>setF(p=>({...p,balance:e.target.value}))}/></div>

          <div><label>Payoff Date (optional)</label><input type="date" value=${f.payoffDate} onChange=${e=>setF(p=>({...p,payoffDate:e.target.value}))}/></div>

// ── DONUT CHART ───────────────────────────────────────────────────────────
function DonutChart({slices,size=180}){
  const total=slices.reduce((s,x)=>s+x.val,0);
  if(!total)return html`<div style="text-align:center;color:#64748b;padding:20px">No data</div>`;
  const cx=size/2,cy=size/2,R=size*0.42,r=size*0.26;
  let angle=-Math.PI/2;
  const paths=slices.filter(x=>x.val>0).map(x=>{
    const sl=(x.val/total)*Math.PI*2;
    const x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    const x2=cx+R*Math.cos(angle+sl),y2=cy+R*Math.sin(angle+sl);
    const ix1=cx+r*Math.cos(angle),iy1=cy+r*Math.sin(angle);
    const ix2=cx+r*Math.cos(angle+sl),iy2=cy+r*Math.sin(angle+sl);
    const lg=sl>Math.PI?1:0;
    const d=`M ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${lg} 0 ${ix1} ${iy1} Z`;
    angle+=sl;
    return{d,col:x.col,label:x.label,val:x.val,pct:Math.round(x.val/total*100)};
  });
  return html`<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center">
    <svg width=${size} height=${size} style="flex-shrink:0">
      ${paths.map(p=>html`<path key=${p.label} d=${p.d} fill=${p.col} stroke="#0f172a" stroke-width="2.5"/>`)}
      <text x=${cx} y=${cy-6} text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">${fmt(total)}</text>
      <text x=${cx} y=${cy+10} text-anchor="middle" fill="#64748b" font-size="10">per month</text>
    </svg>
    <div style="flex:1;min-width:130px;display:flex;flex-direction:column;gap:8px">
      ${paths.map(p=>html`<div key=${p.label} style="display:flex;align-items:center;gap:8px">
        <div style=${'width:10px;height:10px;border-radius:50%;background:'+p.col+';flex-shrink:0'}/>
        <div style="flex:1;font-size:12px;color:#94a3b8">${p.label}</div>
        <div style="font-size:12px;font-weight:600;color:#e2e8f0">${fmt(p.val)}</div>
        <div style="font-size:11px;color:#64748b;min-width:32px;text-align:right">${p.pct}%</div>
      </div>`)}
    </div>
  </div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────
function Dashboard({members,income,bills,subs,cards,loans,savings,funds,trips,sel}){
  const fp=arr=>sel==='all'?arr:arr.filter(x=>x.pid===sel||x.pid==='household');
  const mIncome=fp(income).reduce((s,x)=>s+toM(x.amt,x.freq),0);
  const mBills=fp(bills).reduce((s,x)=>s+toM(x.amt,x.freq),0);
  const mSubs=subs.reduce((s,x)=>s+toM(x.amt,x.freq),0);
  const mLoans=fp(loans).reduce((s,x)=>s+x.monthlyPmt,0);
  const mCards=fp(cards).reduce((s,x)=>s+x.minPmt,0);
  const mOut=mBills+mSubs+mLoans+mCards;
  const net=mIncome-mOut;
  const totalDebt=[...fp(cards),...fp(loans)].reduce((s,x)=>s+(x.balance||0),0);
  const efBal=funds.reduce((s,f)=>s+f.balance,0);
  const efMo=mOut>0?efBal/mOut:0;
  const outItems=[{label:'Bills',val:mBills,col:'#ef4444'},{label:'Subscriptions',val:mSubs,col:'#f59e0b'},{label:'Loan Payments',val:mLoans,col:'#8b5cf6'},{label:'Card Min. Pmts',val:mCards,col:'#ec4899'}].filter(x=>x.val>0);
  const upcoming=trips.filter(t=>mUntil(t.date)>0).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,3);
  const personRows=members.filter(m=>m.role!=='Shared'&&(sel==='all'||m.id===sel)).map(m=>({m,inc:income.filter(x=>x.pid===m.id).reduce((s,x)=>s+toM(x.amt,x.freq),0),bil:bills.filter(x=>x.pid===m.id).reduce((s,x)=>s+toM(x.amt,x.freq),0)})).filter(r=>r.inc>0||r.bil>0);
  const catColors={Home:'#3b82f6',Insurance:'#8b5cf6',Food:'#f59e0b',Transport:'#10b981',Family:'#ec4899',Leisure:'#f97316',Other:'#64748b'};
  return html`<div class="fade-in space-y-6">
    <div><h1 class="text-2xl font-bold">Dashboard</h1><p style="color:#94a3b8;font-size:13px;margin-top:4px">Kudhail Family · ${new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</p></div>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
      <${StatCard} label="Monthly Income"  value=${fmt(mIncome)}  color="green"  icon="💰"/>
      <${StatCard} label="Monthly Outflow" value=${fmt(mOut)}     color="red"    icon="📤"/>
      <${StatCard} label="Net Cash Flow"   value=${(net>=0?'+':'')+fmt(net)} color=${net>=0?'green':'red'} icon="📊"/>
      <${StatCard} label="Yearly Income"   value=${fmtK(mIncome*12)} color="green" icon="📈"/>
      <${StatCard} label="Emergency Fund"  value=${efMo.toFixed(1)+'mo'} sub=${fmt(efBal)} color=${efMo>=3?'green':'amber'} icon="🛡️"/>
      <${StatCard} label="Total Debt"      value=${fmtK(totalDebt)} color=${totalDebt>0?'red':'green'} icon="💳"/>
    </div>
    <${Card} cls="p-5">
      <div class="font-semibold mb-1">Spending Breakdown</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:16px">Where your money goes each month</div>
      <${DonutChart} slices=${outItems} size=${200}/>
    </>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <${Card} cls="p-5">
        <div class="font-semibold mb-1">Cash Flow Breakdown</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:16px">Monthly income vs outgoings</div>
        <div class="space-y-3">
          <div>
            <div class="flex justify-between text-sm mb-1"><span style="color:#94a3b8">Income</span><span class="font-bold" style="color:#34d399">${fmt(mIncome)}</span></div>
            <div class="pt" style="height:8px"><div class="pf" style="height:8px;width:100%;background:#10b981"/></div>
          </div>
          ${outItems.map(x=>html`<div key=${x.label}>
            <div class="flex justify-between text-sm mb-1"><span style="color:#94a3b8">${x.label}</span><span class="font-semibold" style=${'color:'+x.col}>${fmt(x.val)}</span></div>
            <div class="pt" style="height:8px"><div class="pf" style=${'height:8px;width:'+(mIncome>0?Math.min(100,x.val/mIncome*100):0)+'%;background:'+x.col}/></div>
          </div>`)}
          <div class="pt-3 border-t border-slate-700 flex justify-between items-center">
            <span class="font-semibold">Net Cash Flow</span>
            <span class="font-bold text-lg" style=${'color:'+(net>=0?'#34d399':'#f87171')}>${net>=0?'+':''} ${fmt(net)}/mo</span>
          </div>
          ${net>=0&&html`<p style="font-size:12px;color:#64748b">≈ ${fmt(net*12)}/year surplus</p>`}
        </div>
      </>
      <${Card} cls="p-5">
        <div class="font-semibold mb-1">Bills by Category</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:16px">Monthly breakdown</div>
        ${[...new Set(bills.map(b=>b.cat))].map(cat=>{
          const total=fp(bills).filter(b=>b.cat===cat).reduce((s,b)=>s+toM(b.amt,b.freq),0);
          if(!total)return null;
          const pct=mBills>0?Math.min(100,total/mBills*100):0;
          const col=catColors[cat]||'#64748b';
          return html`<div key=${cat} class="mb-3">
            <div class="flex justify-between text-sm mb-1"><span style="color:#94a3b8">${cat}</span><span class="font-semibold" style=${'color:'+col}>${fmt(total)}</span></div>
            <div class="pt" style="height:8px"><div class="pf" style=${'height:8px;width:'+pct+'%;background:'+col}/></div>
          </div>`;
        })}
      </>
    </div>
    ${personRows.length>0&&html`<${Card} cls="p-5">
      <div class="font-semibold mb-4">Breakdown by Person</div>
      <div class="space-y-4">
        ${personRows.map(({m,inc,bil})=>html`<div key=${m.id} class="flex items-center gap-4">
          <${Avatar} m=${m}/>
          <div style="width:72px;font-size:13px;font-weight:500;flex-shrink:0">${m.name}</div>
          <div style="flex:1">
            ${inc>0&&html`<div><div class="flex justify-between" style="font-size:11px;margin-bottom:2px"><span style="color:#64748b">Income</span><span style="color:#34d399">${fmt(inc)}/mo</span></div><div class="pt" style="height:6px"><div class="pf" style=${'height:6px;width:'+(mIncome>0?inc/mIncome*100:0)+'%;background:#10b981'}/></div></div>`}
            ${bil>0&&html`<div style="margin-top:4px"><div class="flex justify-between" style="font-size:11px;margin-bottom:2px"><span style="color:#64748b">Bills</span><span style="color:#f87171">${fmt(bil)}/mo</span></div><div class="pt" style="height:6px"><div class="pf" style=${'height:6px;width:'+(mOut>0?bil/mOut*100:0)+'%;background:#ef4444'}/></div></div>`}
          </div>
        </div>`)}
      </div>
    </>`}
    ${upcoming.length>0&&html`<${Card} cls="p-5">
      <div class="font-semibold mb-4">Upcoming Trips ✈️</div>
      <div class="space-y-4">
        ${upcoming.map(t=>{
          const mos=mUntil(t.date);
          const pct=t.totalCost>0?Math.min(100,t.currentSavings/t.totalCost*100):0;
          const needed=Math.max(0,t.totalCost-t.currentSavings);
          return html`<div key=${t.id} class="flex items-center gap-4">
            <span style="font-size:24px">✈️</span>
            <div style="flex:1">
              <div class="flex justify-between text-sm"><span class="font-medium">${t.name}${t.destination?' · '+t.destination:''}</span><span style="color:#94a3b8">${mos}mo away</span></div>
              <div class="pt my-1" style="height:6px"><div class="pf" style=${'height:6px;width:'+pct+'%;background:#3b82f6'}/></div>
              <div class="flex justify-between" style="font-size:11px;color:#64748b"><span>${fmt(t.currentSavings)} of ${fmt(t.totalCost)}</span><span style=${'color:'+(needed>0?'#fbbf24':'#10b981')}>${needed>0?fmt(needed)+' to go':'Fully funded!'}</span></div>
            </div>
          </div>`;
        })}
      </div>
    </>`}
  </div>`;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',   icon:'🏠',label:'Dashboard'},
  {id:'income',      icon:'💰',label:'Income'},
  {id:'bills',       icon:'📋',label:'Monthly Bills'},
  {id:'subs',        icon:'📱',label:'Subscriptions'},
  {id:'cards',       icon:'💳',label:'Credit Cards'},
  {id:'loans',       icon:'🏦',label:'Loans'},
  {id:'savings',     icon:'📈',label:'Savings & Investments'},
  {id:'emergency',   icon:'🛡️',label:'Emergency Fund'},
  {id:'retirement',  icon:'🏖️',label:'Retirement'},
  {id:'trips',       icon:'✈️',label:'Trip Savings'},
  {id:'family',      icon:'👨‍👩‍👧‍👦',label:'Family Members'},
];
function Sidebar({page,setPage,open,setOpen}){
  return html`<${Fragment}>
    ${open&&html`<div onClick=${()=>setOpen(false)} style="position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.5)" class="lg:hidden"/>`}
    <aside style=${'position:fixed;top:0;left:0;height:100%;width:240px;z-index:40;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;transition:transform .2s;transform:'+(open?'translateX(0)':'translateX(-100%)')} class=${open?'':'lg:transform-none'}>
      <div style="padding:16px;border-bottom:1px solid #1e293b">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:36px;height:36px;border-radius:10px;background:#3b82f6;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff">K</div>
          <div><div style="font-weight:700;font-size:14px">Kudhail Family</div><div style="font-size:11px;color:#64748b">Finance Tracker</div></div>
        </div>
      </div>
      <nav style="flex:1;overflow-y:auto;padding:8px 0">
        ${NAV.map(n=>html`<button key=${n.id} onClick=${()=>{setPage(n.id);setOpen(false)}} class=${'nav-item '+(page===n.id?'active':'')}>
          <span style="font-size:15px;width:20px;text-align:center;flex-shrink:0">${n.icon}</span>
          <span>${n.label}</span>
        </button>`)}
      </nav>
      <div style="padding:12px 16px;border-top:1px solid #1e293b;font-size:11px;color:#334155">Data saved in your browser</div>
    </aside>
  </${Fragment}>`;
}

// ── APP ───────────────────────────────────────────────────────────────────
function App(){
  const s=load();
  const[members, setMembers] =useState(s?.members  ||DEF_MEMBERS);
  const[income,  setIncome]  =useState(s?.income   ||[]);
  const[bills,   setBills]   =useState(s?.bills    ||DEF_BILLS);
  const[subs,    setSubs]    =useState(s?.subs     ||DEF_SUBS);
  const[cards,   setCards]   =useState(s?.cards    ||[]);
  const[loans,   setLoans]   =useState(s?.loans    ||[]);
  const[savings, setSavings] =useState(s?.savings  ||[]);
  const[funds,   setFunds]   =useState(s?.funds    ||[]);
  const[goals,   setGoals]   =useState(s?.goals    ||[]);
  const[trips,   setTrips]   =useState(s?.trips    ||[]);
  const[page,    setPage]    =useState('dashboard');
  const[sel,     setSel]     =useState('all');
  const[sideOpen,setSideOpen]=useState(false);

  useEffect(()=>{save({members,income,bills,subs,cards,loans,savings,funds,goals,trips})},[members,income,bills,subs,cards,loans,savings,funds,goals,trips]);

  const monthlyOut=useMemo(()=>
    bills.reduce((s,x)=>s+toM(x.amt,x.freq),0)+
    subs.reduce((s,x)=>s+toM(x.amt,x.freq),0)+
    loans.reduce((s,x)=>s+x.monthlyPmt,0)+
    cards.reduce((s,x)=>s+x.minPmt,0)
  ,[bills,subs,loans,cards]);

  const sp={members,sel};
  const pages={
    dashboard: html`<${Dashboard} ...${sp} income=${income} bills=${bills} subs=${subs} cards=${cards} loans=${loans} savings=${savings} funds=${funds} trips=${trips}/>`,
    income:    html`<${IncomePage} ...${sp} income=${income} setIncome=${setIncome}/>`,
    bills:     html`<${BillsPage} ...${sp} bills=${bills} setBills=${setBills}/>`,
    subs:      html`<${SubsPage} subs=${subs} setSubs=${setSubs}/>`,
    cards:     html`<${CardsPage} ...${sp} cards=${cards} setCards=${setCards}/>`,
    loans:     html`<${LoansPage} ...${sp} loans=${loans} setLoans=${setLoans}/>`,
    savings:   html`<${SavingsPage} ...${sp} savings=${savings} setSavings=${setSavings}/>`,
    emergency: html`<${EmergencyPage} funds=${funds} setFunds=${setFunds} monthlyOut=${monthlyOut}/>`,
    retirement:html`<${RetirementPage} ...${sp} goals=${goals} setGoals=${setGoals}/>`,
    trips:     html`<${TripsPage} trips=${trips} setTrips=${setTrips}/>`,
    family:    html`<${FamilyPage} members=${members} setMembers=${setMembers}/>`,
  };

  return html`<div style="display:flex;height:100vh;overflow:hidden">
    <${Sidebar} page=${page} setPage=${setPage} open=${sideOpen} setOpen=${setSideOpen}/>
    <div id="main" style="flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:0">
      <style>@media(min-width:1024px){#main{margin-left:240px}}</style>
      <header style="display:flex;align-items:center;gap:12px;padding:10px 20px;flex-shrink:0;background:#0f172a;border-bottom:1px solid #1e293b">
        <button onClick=${()=>setSideOpen(true)} class="lg:hidden" style="background:none;border:none;color:#94a3b8;cursor:pointer;display:flex;align-items:center">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        ${page!=='family'&&page!=='subs'&&html`<${PersonFilter} members=${members} sel=${sel} onChange=${setSel}/>`}
      </header>
      <main style="flex:1;overflow-y:auto;padding:20px 24px">
        ${pages[page]||pages.dashboard}
      </main>
    </div>
  </div>`;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
